<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Reel Feed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 16px 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    /* Wrapper clips the scaled phone to correct visual size */
    .phone-wrapper {
      width: 254px;
      height: 549px;
      overflow: hidden;
      position: relative;
      border-radius: 32px;
      box-shadow: 0 0 0 2px #444, 0 20px 60px rgba(0,0,0,0.8);
    }

    /* Phone shell — original size, scaled down inside wrapper */
    .phone {
      width: 390px;
      height: 844px;
      background: #000;
      border-radius: 50px;
      border: 8px solid #222;
      overflow: hidden;
      position: absolute;
      top: 0;
      left: 0;
      transform: scale(0.652);
      transform-origin: top left;
    }

    /* Feed container — snaps per video */
    .feed {
      width: 100%;
      height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .feed::-webkit-scrollbar { display: none; }

    /* Individual video card */
    .reel {
      width: 100%;
      height: 100%;
      position: relative;
      scroll-snap-align: start;
      overflow: hidden;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Tap to play/pause overlay */
    .tap-area {
      position: absolute;
      inset: 0;
      z-index: 2;
      cursor: pointer;
    }

    /* Play icon shown when paused */
    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 72px;
      height: 72px;
      background: rgba(0,0,0,0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease;
      pointer-events: none;
      z-index: 3;
    }
    .play-icon svg { width: 32px; height: 32px; fill: #fff; }
    .play-icon.show { transform: translate(-50%, -50%) scale(1); }

    /* Gradient overlay at bottom */
    .gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 320px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Bottom info */
    .info {
      position: absolute;
      bottom: 80px;
      left: 16px;
      right: 80px;
      z-index: 4;
      pointer-events: none;
    }
    .username {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .follow-btn {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      border: 1.5px solid #fff;
      border-radius: 4px;
      padding: 2px 8px;
      cursor: pointer;
      pointer-events: all;
      background: transparent;
      transition: background 0.2s;
    }
    .follow-btn.following {
      background: rgba(255,255,255,0.2);
      border-color: transparent;
    }
    .caption {
      font-size: 13px;
      color: #fff;
      line-height: 1.5;
      margin-bottom: 6px;
    }
    .song {
      font-size: 12px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.9;
    }
    .song svg { width: 12px; height: 12px; fill: #fff; animation: spin 4s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Right actions */
    .actions {
      position: absolute;
      right: 12px;
      bottom: 90px;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Avatar */
    .avatar-wrap {
      position: relative;
      margin-bottom: 4px;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #fff;
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      overflow: hidden;
    }
    .avatar-plus {
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 20px;
      background: #fe2c55;
      border-radius: 50%;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      font-weight: 700;
      line-height: 1;
    }

    /* Action button */
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn .icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease;
    }
    .action-btn:active .icon { transform: scale(0.85); }
    .action-btn svg { width: 28px; height: 28px; fill: #fff; }
    .action-btn .label {
      font-size: 12px;
      color: #fff;
      font-weight: 600;
    }

    /* Like animation */
    .action-btn.liked svg { fill: #fe2c55; }
    .action-btn.liked .icon { animation: pop 0.3s ease; }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.35); }
      100% { transform: scale(1); }
    }

    /* Vinyl disc for audio */
    .vinyl {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #333, #111);
      border: 3px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: spin 4s linear infinite;
    }
    .vinyl-inner {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #000;
      border: 2px solid #888;
    }

    /* For You header */
    .foryou-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px 16px 10px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
      pointer-events: none;
    }
    .foryou-tabs {
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .foryou-tab {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .foryou-tab.active {
      color: #fff;
      position: relative;
    }
    .foryou-tab.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 2px;
      background: #fff;
      border-radius: 1px;
    }

    /* Progress bar */
    .progress-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: rgba(255,255,255,0.4);
      width: 100%;
      z-index: 5;
    }
    .progress-fill {
      height: 100%;
      background: #fff;
      width: 0%;
      transition: width 0.1s linear;
    }

    /* Mute button */
    .mute-btn {
      position: absolute;
      top: 60px;
      right: 16px;
      z-index: 5;
      background: rgba(0,0,0,0.5);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .mute-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* Comment sheet (simple) */
    .comment-sheet {
      position: absolute;
      bottom: -100%;
      left: 0; right: 0;
      height: 65%;
      background: #1a1a1a;
      border-radius: 20px 20px 0 0;
      z-index: 10;
      transition: bottom 0.35s cubic-bezier(0.4,0,0.2,1);
      padding: 0 16px;
    }
    .comment-sheet.open { bottom: 0; }
    .sheet-handle {
      width: 36px;
      height: 4px;
      background: #444;
      border-radius: 2px;
      margin: 12px auto 16px;
    }
    .sheet-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 16px;
    }
    .comments-list {
      overflow-y: auto;
      height: calc(100% - 120px);
    }
    .comment-item {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .comment-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }
    .comment-text { font-size: 13px; color: #fff; line-height: 1.4; }
    .comment-author { font-weight: 700; margin-right: 6px; }
    .comment-input-row {
      display: flex;
      gap: 8px;
      padding: 10px 0;
      border-top: 1px solid #333;
    }
    .comment-input {
      flex: 1;
      background: #2a2a2a;
      border: none;
      border-radius: 20px;
      padding: 8px 14px;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    .comment-send {
      background: #fe2c55;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .comment-send svg { width: 16px; height: 16px; fill: #fff; }
    .sheet-overlay {
      position: absolute;
      inset: 0;
      z-index: 9;
      display: none;
    }
    .sheet-overlay.active { display: block; }

    /* Floating heart animation */
    .float-heart {
      position: absolute;
      font-size: 48px;
      pointer-events: none;
      z-index: 20;
      animation: floatUp 0.8s ease forwards;
    }
    @keyframes floatUp {
      0% { transform: scale(0.5) translateY(0); opacity: 1; }
      100% { transform: scale(1.5) translateY(-100px); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="phone-wrapper">
<div class="phone">
  <!-- For You header — sits on top of the feed -->
  <div class="foryou-bar">
    <div class="foryou-tabs">
      <span class="foryou-tab">Following</span>
      <span class="foryou-tab active">For You</span>
      <span class="foryou-tab">LIVE</span>
    </div>
  </div>
  <div class="feed" id="feed">
    <!-- Reels injected by JS -->
  </div>
</div>
</div>

<script>
const videos = [
  { src: 'video1_new.mp4', user: '@7NEWSAustralia', caption: "A fire has destroyed a temple hall that houses Japan's 'eternal flame'.", song: 'Original Sound', emoji: '🔥' },
  { src: 'video2.mp4',     user: '@BBCNews',        caption: "End of an era! #Claires #UK #BBCNews", song: 'Original sound', emoji: '📰' },
  { src: 'video3.mp4',     user: '@BBCNews',        caption: "Wellington received a record 77mm (3in) of rain in less than an hour on Monday, according to the mayor.", song: 'Original sound', emoji: '🌧️' },
  { src: 'video4.mp4',     user: '@Dutchbreakingnews', caption: "The Netherlands is urging citizens to prepare for possible power, water, and communication outages.", song: 'Original sound', emoji: '🇳🇱' },
  { src: 'video5.mp4',     user: '@parleyfortheoceans', caption: '"For much of the world, \'normal\' is gone." - Director of the UN University Institute for Water, Environment and Health.', song: 'Original sound', emoji: '🌊' },
];

const fakeCounts = [
  { likes: '14.2K', comments: '342', shares: '891' },
  { likes: '8.7K',  comments: '215', shares: '463' },
  { likes: '22.1K', comments: '589', shares: '1.2K' },
  { likes: '5.4K',  comments: '128', shares: '301' },
  { likes: '31.8K', comments: '974', shares: '2.1K' },
];

let isMuted = false;

function buildReel(v, i) {
  const c = fakeCounts[i];
  const div = document.createElement('div');
  div.className = 'reel';
  div.innerHTML = `
    <video src="${v.src}" loop playsinline preload="metadata"></video>
    <div class="tap-area"></div>
    <div class="play-icon" id="playIcon${i}">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <div class="gradient"></div>

    <button class="mute-btn" id="muteBtn${i}">
      <svg id="muteIcon${i}" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </button>

    <div class="info">
      <div class="username">
        ${v.user}
      </div>
      <div class="caption">${v.caption}</div>
      <div class="song">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        ${v.song}
      </div>
    </div>

    <div class="actions">
      <div class="avatar-wrap">
        <div class="avatar">${v.emoji}</div>
        <div class="avatar-plus">+</div>
      </div>

      <div class="action-btn" id="likeBtn${i}" data-liked="false" data-count="${c.likes}">
        <div class="icon">
          <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </div>
        <span class="label">${c.likes}</span>
      </div>

      <div class="action-btn comment-trigger" id="commentBtn${i}" data-index="${i}">
        <div class="icon">
          <svg viewBox="0 0 24 24"><path d="M21 6.5C21 5.12 19.88 4 18.5 4h-13C4.12 4 3 5.12 3 6.5v9C3 16.88 4.12 18 5.5 18H18l4 4V6.5z"/></svg>
        </div>
        <span class="label">${c.comments}</span>
      </div>

      <div class="action-btn" id="shareBtn${i}">
        <div class="icon">
          <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
        </div>
        <span class="label">${c.shares}</span>
      </div>

      <div class="vinyl" id="vinyl${i}">
        <div class="vinyl-inner"></div>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="prog${i}"></div></div>

    <!-- Comment sheet -->
    <div class="sheet-overlay" id="overlay${i}"></div>
    <div class="comment-sheet" id="sheet${i}">
      <div class="sheet-handle"></div>
      <div class="sheet-title">Comments</div>
      <div class="comments-list">
        <div class="comment-item"><div class="comment-avatar">😊</div><div class="comment-text"><span class="comment-author">user_a</span>This is so important 😍</div></div>
        <div class="comment-item"><div class="comment-avatar">🎨</div><div class="comment-text"><span class="comment-author">news_fan</span>Incredible footage 🔥</div></div>
        <div class="comment-item"><div class="comment-avatar">📚</div><div class="comment-text"><span class="comment-author">globalwatch</span>We need to talk about this more 🙌</div></div>
      </div>
      <div class="comment-input-row">
        <input class="comment-input" placeholder="Add a comment..." />
        <button class="comment-send"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
      </div>
    </div>
  `;

  // Tap to play/pause
  const video = div.querySelector('video');
  const tapArea = div.querySelector('.tap-area');
  const playIcon = div.querySelector(`#playIcon${i}`);
  tapArea.addEventListener('click', (e) => {
    // Don't trigger if clicking actions
    if (video.paused) {
      video.play();
      playIcon.classList.remove('show');
    } else {
      video.pause();
      playIcon.classList.add('show');
    }
  });

  // Double tap like
  let lastTap = 0;
  tapArea.addEventListener('click', (e) => {
    const now = Date.now();
    if (now - lastTap < 300) {
      triggerLike(i, div, e);
    }
    lastTap = now;
  });

  // Progress bar
  video.addEventListener('timeupdate', () => {
    const pct = (video.currentTime / video.duration) * 100 || 0;
    div.querySelector(`#prog${i}`).style.width = pct + '%';
  });

  // Like button
  const likeBtn = div.querySelector(`#likeBtn${i}`);
  likeBtn.addEventListener('click', () => triggerLike(i, div, null));

  // Follow button removed

  // Mute button
  const muteBtn = div.querySelector(`#muteBtn${i}`);
  muteBtn.addEventListener('click', () => {
    isMuted = !isMuted;
    document.querySelectorAll('.reel video').forEach(v => v.muted = isMuted);
    document.querySelectorAll('[id^=muteIcon]').forEach(ic => {
      ic.innerHTML = isMuted
        ? '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>'
        : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
    });
  });

  // Comment sheet
  const commentBtn = div.querySelector(`#commentBtn${i}`);
  const sheet = div.querySelector(`#sheet${i}`);
  const sheetOverlay = div.querySelector(`#overlay${i}`);
  commentBtn.addEventListener('click', () => {
    sheet.classList.add('open');
    sheetOverlay.classList.add('active');
  });
  sheetOverlay.addEventListener('click', () => {
    sheet.classList.remove('open');
    sheetOverlay.classList.remove('active');
  });

  // Comment send
  const input = div.querySelector('.comment-input');
  const sendBtn = div.querySelector('.comment-send');
  sendBtn.addEventListener('click', () => addComment(i, div, input));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addComment(i, div, input); });

  return div;
}

function triggerLike(i, container, e) {
  const likeBtn = container.querySelector(`#likeBtn${i}`);
  const label = likeBtn.querySelector('.label');
  const isLiked = likeBtn.dataset.liked === 'true';

  if (!isLiked) {
    likeBtn.dataset.liked = 'true';
    likeBtn.classList.add('liked');
    // Show floating heart
    if (e) {
      const heart = document.createElement('div');
      heart.className = 'float-heart';
      heart.textContent = '❤️';
      heart.style.left = (e.offsetX - 24) + 'px';
      heart.style.top = (e.offsetY - 24) + 'px';
      container.appendChild(heart);
      setTimeout(() => heart.remove(), 900);
    }
  } else {
    likeBtn.dataset.liked = 'false';
    likeBtn.classList.remove('liked');
  }
}

function addComment(i, container, input) {
  const text = input.value.trim();
  if (!text) return;
  const list = container.querySelector('.comments-list');
  const item = document.createElement('div');
  item.className = 'comment-item';
  item.innerHTML = `<div class="comment-avatar">😊</div><div class="comment-text"><span class="comment-author">you</span>${text}</div>`;
  list.appendChild(item);
  list.scrollTop = list.scrollHeight;
  input.value = '';
}

// Build all reels
const feed = document.getElementById('feed');
videos.forEach((v, i) => feed.appendChild(buildReel(v, i)));

// IntersectionObserver — play active, pause others
const reels = document.querySelectorAll('.reel');
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const video = entry.target.querySelector('video');
    const vinyl = entry.target.querySelector('[id^=vinyl]');
    if (entry.isIntersecting) {
      video.play().catch(() => {});
      if (vinyl) vinyl.style.animationPlayState = 'running';
    } else {
      video.pause();
      video.currentTime = 0;
      if (vinyl) vinyl.style.animationPlayState = 'paused';
    }
  });
}, { threshold: 0.7 });

reels.forEach(r => observer.observe(r));
</script>
</body>
</html>
